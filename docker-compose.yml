services:
  backend:
    build:
      context: ./backend
    environment:
      MODEL_CONFIG_PATH: /app/config/models.json
      DATABASE_PATH: /app/data/status.db
      PROBE_CRON: "${PROBE_CRON:-*/10 * * * *}"
      STATUS_WINDOW_DAYS: ${STATUS_WINDOW_DAYS:-7}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://111.228.11.160/}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
    volumes:
      - ./config/models.example.json:/app/config/models.json:ro
      - status-data:/app/data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  status-data:
